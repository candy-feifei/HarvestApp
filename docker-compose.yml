# 本地开发用 PostgreSQL，与 backend/.env 中 DATABASE_URL 默认约定一致。
services:
  postgres:
    image: postgres:16-alpine
    container_name: harvestapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: harvestapp
    # 宿主机用 5433，避免与本机已安装的 PostgreSQL（常见占用 5432）冲突
    ports:
      - "5433:5432"
    volumes:
      - harvestapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harvestapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  harvestapp_pgdata:
