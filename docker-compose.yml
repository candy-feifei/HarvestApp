# 一键启动：PostgreSQL + Nest API + 前端（Nginx 反代 /api）
# 使用：在项目根目录执行  docker compose up -d --build
# 访问：http://localhost:8080  ；API 文档：http://localhost:8080/api/docs
# 仅开发数据库（本机连 5432）：docker compose up -d postgres

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: harvestapp
    volumes:
      - harvestapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harvestapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/harvestapp?schema=public
      # 生产请改为强随机串，或复制 .env 中的值
      JWT_SECRET: ${JWT_SECRET:-change-me-in-docker-compose}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  harvestapp_pgdata:
  backend_uploads:
